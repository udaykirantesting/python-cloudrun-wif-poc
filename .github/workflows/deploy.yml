name: Deploy to Cloud Run

on:
  push:
    branches:
      - main  # Deploy only when code is pushed to the main branch

env:
  PROJECT_ID: project-2a99e1ae-69fc-4f91-8da   ###${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: my-repo
  IMAGE_NAME: python-sql-app
  SERVICE_NAME: python-sql-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/537727641358/locations/global/workloadIdentityPools/sa-github-pool/providers/github-provider' ##${{ secrets.WIF_PROVIDER }}
          service_account: cloud-run-sql-sa@project-2a99e1ae-69fc-4f91-8da.iam.gserviceaccount.com ###${{ secrets.WIF_SERVICE_ACCOUNT }}

      # 2. Configure Docker to use Artifact Registry
      - name: Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 3. Build and Push Docker Image
      - name: Build and Push Container
        run: |
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      # 4. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Environment variables and Cloud SQL configuration
          env_vars: |
            INSTANCE_CONNECTION_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:my-postgres-instance
            DB_USER=postgres
            DB_NAME=my_database
          # Reference the Secret Manager secret for the DB password
          secrets: |
            DB_PASS=db-password-secret:latest
          # Attach the Cloud SQL instance
          flags: |
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:my-postgres-instance
            --service-account=cloud-run-sql-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
